server {
    listen 8080;
    server_name _;
    root /app/public;

    # Toutes les requetes passent par le front controller Symfony
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # On bloque l'execution de tout autre script PHP
    location ~ \.php$ {
        return 404;
    }

    # Logs envoyes vers la sortie standard pour etre captures par Fly
    error_log /dev/stderr;
    access_log /dev/stdout;
}
